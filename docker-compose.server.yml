# 服务器部署专用 —— 无需源码，直接拉取镜像运行
# 用法：docker compose -f docker-compose.server.yml up -d

name: kindergarten

services:
  mysql:
    image: mysql:8.0
    container_name: kindergarten-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: lirui520
      MYSQL_DATABASE: kindergarten
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    # 不映射端口，仅内部网络访问，避免与宿主机 MySQL 冲突
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kindergarten-net

  backend:
    image: orangeofcoffee/kindergarten-backend:latest
    container_name: kindergarten-backend
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: lirui520
    networks:
      - kindergarten-net

  frontend:
    image: orangeofcoffee/kindergarten-frontend:latest
    container_name: kindergarten-frontend
    restart: always
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - kindergarten-net

volumes:
  mysql-data:

networks:
  kindergarten-net:
    driver: bridge

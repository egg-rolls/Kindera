name: kindergarten

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: kindergarten-mysql
    environment:
      MYSQL_ROOT_PASSWORD: lirui520
      MYSQL_DATABASE: kindergarten
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kindergarten-net

  # Spring Boot 后端（需先本地构建 jar）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kindergarten-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: lirui520
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kindergarten?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: lirui520
    networks:
      - kindergarten-net

  # Vue 前端
  frontend:
    build: ./frontend
    container_name: kindergarten-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - kindergarten-net

volumes:
  mysql-data:

networks:
  kindergarten-net:
    driver: bridge
